<!DOCTYPE html>

<style>

<body>
<div id="app" style="padding:5px;text-align:center;color:var(--text-light);font-size:1.2em">טוען נתונים...</div>

<script>
const DATA_FILE = 'trip_data.json';

function buildLinks(links) {
  if (!links || Object.keys(links).length === 0) return '';
  let html = '<div class="activity-links">';
  if (links.map) html += '<a href="'+links.map+'" target="_blank">📍 מפה</a>';
  if (links.map2) { const v = Array.isArray(links.map2)?links.map2:[links.map2,'📍 מפה 2']; html += '<a href="'+v[0]+'" target="_blank">'+v[1]+'</a>'; }
  if (links.info) html += '<a href="'+links.info+'" target="_blank">📖 קרא עוד</a>';
  if (links.photos) html += '<a href="'+links.photos+'" target="_blank">📸 תמונות</a>';
  if (links.tickets) { const v = Array.isArray(links.tickets)?links.tickets:[links.tickets,'🎫 כרטיסים']; html += '<a href="'+v[0]+'" target="_blank">'+v[1]+'</a>'; }
  if (links.search) { const v = Array.isArray(links.search)?links.search:[links.search,'🔍 חפש']; html += '<a href="'+v[0]+'" target="_blank">'+v[1]+'</a>'; }
  if (links.site) { const v = Array.isArray(links.site)?links.site:[links.site,'🔗 אתר']; html += '<a href="'+v[0]+'" target="_blank">'+v[1]+'</a>'; }
  html += '</div>';
  return html;
}

function buildActivities(activities) {
  return '<ul class="activities">' + activities.map(function(a) {
    var tagHtml = '';
    if (a.tag === 'must') tagHtml = '<span class="activity-tag must">חובה</span>';
    else if (a.tag === 'optional') tagHtml = '<span class="activity-tag optional">רשות</span>';
    var detailLink = '';
    if (a.slug && a.detail) detailLink = '<a href="activity.html#'+a.slug+'" class="detail-link">ℹ️ פרטים נוספים</a>';
    return '<li class="activity"><span class="activity-icon">'+a.icon+'</span><div class="activity-content">' +
      '<div class="activity-title">'+tagHtml+a.title+(a.title_en ? ' <span class="activity-en">'+a.title_en+'</span>' : '')+'</div>' +
      '<div class="activity-desc">'+a.desc+'</div>' +
      '<div class="activity-links">' + detailLink + '</div>' +
      buildLinks(a.links) +
    '</div></li>';
  }).join('') + '</ul>';
}

function buildExpandSection(dest) {
  if (!dest.extended_desc && !dest.timing && !dest.transport) return '';
  var uid = 'exp_' + dest.id;
  var h = '<div class="dest-expand">';
  h += '<button class="dest-expand-toggle" onclick="toggleExpand(this)">ℹ️ מידע מורחב — תיאור, תחבורה ותזמון <span class="arrow">▼</span></button>';
  h += '<div class="dest-expand-body" id="'+uid+'">';
  if (dest.extended_desc) h += '<div class="dest-extended-desc">'+dest.extended_desc+'</div>';
  if (dest.timing) {
    h += '<div class="dest-info-section"><h5>⏰ תזמון מומלץ</h5><div class="dest-info-items">';
    if (dest.timing.best_arrival) h += '<span class="dest-info-tag">🛬 הגעה: '+dest.timing.best_arrival+'</span>';

    h += '</div></div>';
  }
  if (dest.transport) {
    h += '<div class="dest-info-section"><h5>🚗 תחבורה</h5>';
    if (dest.transport.to && dest.transport.to.length) {
      h += '<div style="margin-bottom:8px"><strong style="font-size:.85em;color:var(--text-light)">הגעה ליעד:</strong><div class="dest-info-items" style="margin-top:4px">';
      dest.transport.to.forEach(function(t){ h += '<span class="dest-info-tag">➡️ '+t+'</span>'; });
      h += '</div></div>';
    }
    if (dest.transport.from && dest.transport.from.length) {
      h += '<div style="margin-bottom:8px"><strong style="font-size:.85em;color:var(--text-light)">מהיעד הלאה:</strong><div class="dest-info-items" style="margin-top:4px">';
      dest.transport.from.forEach(function(t){ h += '<span class="dest-info-tag">⬅️ '+t+'</span>'; });
      h += '</div></div>';
    }
    if (dest.transport.local && dest.transport.local.length) {
      h += '<div><strong style="font-size:.85em;color:var(--text-light)">תחבורה מקומית:</strong><div class="dest-info-items" style="margin-top:4px">';
      dest.transport.local.forEach(function(t){ h += '<span class="dest-info-tag">🔄 '+t+'</span>'; });
      h += '</div></div>';
    }
    h += '</div>';
  }
  h += '</div></div>';
  return h;
}

function buildDestination(dest) {
  var body = '';
  body += '<div class="day-info-grid">' + dest.info_chips.map(function(c){ var val = c.link ? '<a href="'+c.link+'" target="_blank" style="color:inherit;text-decoration:underline">'+c.value+'</a>' : c.value; return '<div class="info-chip"><span class="label">'+c.label+':</span> '+val+'</div>'; }).join('') + '</div>';
  body += buildExpandSection(dest);

  if (dest.day_tabs && dest.day_panes) {
    body += '<div class="day-tabs" data-group="'+dest.id+'">';
    dest.day_tabs.forEach(function(t, i) {
      body += '<button class="day-tab'+(i===0?' active':'')+'" onclick="showPane(this,\''+dest.id+'\',\''+t.id+'\')">'+t.label+'</button>';
    });
    body += '</div>';
    dest.day_tabs.forEach(function(tab) {
      var pane = dest.day_panes[tab.id];
      if (!pane) return;
      var isFirst = tab.id === dest.day_tabs[0].id;
      var color = dest.header_class==='cambodia'?'var(--cambodia)':dest.header_class==='vietnam'?'var(--vietnam)':'var(--thailand)';
      body += '<div class="day-pane'+(isFirst?' active':'')+'" id="'+tab.id+'">';
      body += '<h4 style="color:'+color+';margin-bottom:12px">'+pane.heading+'</h4>';
      body += buildActivities(pane.activities);
      if (pane.pane_tip) body += '<div class="tip">'+pane.pane_tip+'</div>';
      body += '</div>';
    });
  } else if (dest.day_panes && dest.day_panes['default']) {
    var dp = dest.day_panes['default'];
    var color = dest.header_class==='cambodia'?'var(--cambodia)':dest.header_class==='vietnam'?'var(--vietnam)':'var(--thailand)';
    body += '<h4 style="color:'+color+';margin-bottom:12px">'+dp.heading+'</h4>';
    body += buildActivities(dp.activities);
    if (dp.pane_tip) body += '<div class="tip">'+dp.pane_tip+'</div>';
  } else if (dest.activities) {
    body += buildActivities(dest.activities);
  }

  if (dest.tip) body += '<div class="tip">'+dest.tip+'</div>';

  return '<div class="day-card">' +
    '<div class="day-header '+dest.header_class+'" onclick="toggleCard(this)">' +
      '<div><h3>'+dest.title+'</h3><div class="day-dates">'+dest.dates_label+'</div></div>' +
      '<span class="day-toggle">▲</span>' +
    '</div>' +
    '<div class="day-body">'+body+'</div>' +
  '</div>';
}

    'Golden+Bridge+Ba+Na+Hills':[15.9976,107.9942],
    'Basket+Boat+Cam+Thanh+Hoi+An':[15.8631,108.3395],
    'tailor+shop+hoi+an':[15.8785,108.337],
    'Cua+Dai+Beach,+Hoi+An':[15.8841,108.3701],
    'Cham+Islands,+Vietnam':[15.9433,108.5028],
    'An+Bang+Beach+sunset':[15.9011,108.3511],
    'Noi+Bai+International+Airport+Han':[21.2187,105.807],
    'Old+Quarter,+Hanoi':[21.035,105.852],
    'Temple+of+Literature+Hanoi':[21.0286,105.8355],
    'Hoan+Kiem+Lake,+Hanoi':[21.0288,105.8525],
    'Thang+Long+Water+Puppet+Theatre+H':[21.0318,105.8531],
    'Ha+Long+Bay,+Vietnam':[20.9101,107.1839],
    'Lan+Ha+Bay,+Vietnam':[20.79,107.05],
    'Bun+Cha+Huong+Lien+Hanoi':[21.0133,105.8489],
    'Grand+Palace,+Bangkok':[13.75,100.4913],
    'Wat+Pho,+Bangkok':[13.7465,100.4926],
    'Wat+Arun,+Bangkok':[13.7437,100.4888],
    'ICONSIAM+Bangkok':[13.7267,100.5103],
    'King+Power+Mahanakhon+Bangkok':[13.7234,100.5295],
    'Silom+Road,+Bangkok':[13.7281,100.5349],
    'Suvarnabhumi+Airport+Bangkok':[13.69,100.75]
  };
  // Hotel coordinates
  var hotelCoords = {
    1: [13.3580, 103.8550],  // Angkor Privilege Resort & Spa, Siem Reap
    2: [11.5620, 104.9350],  // Shangri-La Phnom Penh
    3: [10.7780, 106.7000],  // Garden View Court, Ho Chi Minh City
    4: [15.8870, 108.3680],  // Wyndham Hoi An Royal Beachfront
    5: [21.0310, 105.8510],  // May de Ville Crown, Hanoi
    6: [20.9200, 107.0800],  // Stellar of the Seas, Ha Long Bay
    7: [13.7450, 100.5350]   // Bangkok (TBD)
  };
  // Airport coordinates
  var airportPois = [
    {name:'Suvarnabhumi (BKK)', name_he:'סוברנבומי, בנקוק', lat:13.69, lng:100.75},
    {name:'Siem Reap (REP)', name_he:'סיים ריפ', lat:13.4107, lng:103.8128},
    {name:'Phnom Penh (PNH)', name_he:'פנום פן', lat:11.5466, lng:104.8441},
    {name:'Tan Son Nhat (SGN)', name_he:'טאן סון נהאט, הו צ\'י מין', lat:10.8189, lng:106.6519},
    {name:'Da Nang (DAD)', name_he:'דה נאנג', lat:16.0558, lng:108.2022},
    {name:'Noi Bai (HAN)', name_he:'נוי באי, האנוי', lat:21.2187, lng:105.807}
  ];
  // Country colors for activity markers
  var destColors = {thailand:'#241D4F',cambodia:'#032EA1',vietnam:'#DA251D',transit:'#888'};

  // Build Leaflet map
  if (D.map_pois && D.map_pois.length && document.getElementById('tripmap')) {
    var map = L.map('tripmap',{scrollWheelZoom:true}).setView([15,105],5);
    window._tripMap = map;
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
      attribution:'&copy; OpenStreetMap',maxZoom:18
    }).addTo(map);
    var coords = [];
    // City markers (main POIs)
    D.map_pois.forEach(function(p){
      coords.push([p.lat,p.lng]);
      var icon = L.divIcon({
        className:'',
        html:'<div style="background:'+p.color+';color:#fff;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.4);font-family:Heebo,sans-serif;">'+p.num+'</div>',
        iconSize:[28,28],iconAnchor:[14,14]
      });
      L.marker([p.lat,p.lng],{icon:icon}).addTo(map)
        .bindPopup('<strong>'+p.num+'. '+p.name+'</strong><br>'+p.name_he);
    });
    // Draw route line
    var line = L.polyline(coords,{color:'#1B5E7B',weight:3,opacity:0.7,dashArray:'8,8'}).addTo(map);
    map.fitBounds(line.getBounds().pad(0.1));

    // Activity markers - added to a separate layer group
    var activityLayer = L.layerGroup();
    function collectActivities(dest) {
      var acts = [];
      var color = destColors[dest.header_class] || '#E67E22';
      (dest.activities || []).forEach(function(a){ if(a.links && a.links.map) acts.push({a:a,color:color}); });
      var panes = dest.day_panes || {};
      for (var k in panes) {
        (panes[k].activities || []).forEach(function(a){ if(a.links && a.links.map) acts.push({a:a,color:color}); });
      }
      return acts;
    }
    var addedUrls = {};
    D.destinations.forEach(function(dest){
      var acts = collectActivities(dest);
      acts.forEach(function(item){
        var a = item.a, url = a.links.map;
        if (addedUrls[url]) return;
        addedUrls[url] = true;
        var q = url.split('?q=')[1];
        if (!q) return;
        q = q.split('&')[0];
        var c = activityCoords[q];
        if (!c) return;
        var icon = L.divIcon({
          className:'',
          html:'<div style="background:'+item.color+';width:12px;height:12px;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4);opacity:.85;"></div>',
          iconSize:[12,12],iconAnchor:[6,6]
        });
        var name_he = a.title;
        L.marker(c,{icon:icon})
          .bindPopup('<div style="font-family:Heebo,sans-serif;direction:rtl;text-align:right"><strong>'+a.icon+' '+name_he+'</strong>'+(a.title_en?'<br><span style="font-size:.85em;color:#888">'+a.title_en+'</span>':'')+'<br><span style="font-size:.85em">'+a.desc.substring(0,80)+'...</span><br><a href="'+url+'" target="_blank" style="color:var(--primary);font-size:.85em">📍 פתח במפה</a></div>')
          .addTo(activityLayer);
      });
    });

    // Hotel markers
    D.hotels.forEach(function(h){
      var c = hotelCoords[h.num];
      if (!c) return;
      var icon = L.divIcon({
        className:'',
        html:'<div style="background:#2e7d32;color:#fff;width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4);font-family:Heebo,sans-serif;">🏨</div>',
        iconSize:[22,22],iconAnchor:[11,11]
      });
      var label = h.name || h.city;
      var statusHtml = h.status === 'confirmed' ? '<br><span style="color:#2e7d32;font-weight:600">✅ מאושר</span>' : '';
      L.marker(c,{icon:icon})
        .bindPopup('<div style="font-family:Heebo,sans-serif;direction:rtl;text-align:right"><strong>🏨 '+label+'</strong><br><span style="font-size:.85em;color:#888">'+h.city_he+' | '+h.nights+' לילות | '+h.checkin+' → '+h.checkout+'</span>'+statusHtml+(h.link?'<br><a href="'+h.link+'" target="_blank" style="color:var(--primary);font-size:.85em">🔗 צפה במלון</a>':'')+'</div>')
        .addTo(activityLayer);
    });

    // Airport markers
    airportPois.forEach(function(ap){
      var icon = L.divIcon({
        className:'',
        html:'<div style="background:#f57c00;color:#fff;width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4);">✈️</div>',
        iconSize:[22,22],iconAnchor:[11,11]
      });
      L.marker([ap.lat,ap.lng],{icon:icon})
        .bindPopup('<div style="font-family:Heebo,sans-serif;direction:rtl;text-align:right"><strong>✈️ '+ap.name+'</strong><br><span style="font-size:.85em;color:#888">'+ap.name_he+'</span></div>')
        .addTo(activityLayer);
    });

    // Show/hide activity markers based on zoom level
    var ACTIVITY_ZOOM_THRESHOLD = 8;
    function updateActivityVisibility() {
      if (map.getZoom() >= ACTIVITY_ZOOM_THRESHOLD) {
        if (!map.hasLayer(activityLayer)) map.addLayer(activityLayer);
      } else {
        if (map.hasLayer(activityLayer)) map.removeLayer(activityLayer);
      }
    }
    updateActivityVisibility();
    map.on('zoomend', updateActivityVisibility);
  }

  // Restore checklist
  try { var s = JSON.parse(localStorage.getItem('tc4')||'[]'); var items = document.querySelectorAll('#cl li'); for(var i=0;i<items.length;i++){ if(s[i]){items[i].querySelector('input').checked=true;items[i].classList.add('checked');} } } catch(e){}
  // Observe sections
  var obs = new IntersectionObserver(function(es){ es.forEach(function(e){ if(e.isIntersecting){ var id=e.target.id; var btns=document.querySelectorAll('.nav-btn'); for(var i=0;i<btns.length;i++){btns[i].classList.toggle('active',btns[i].getAttribute('onclick')&&btns[i].getAttribute('onclick').indexOf("'"+id+"'")>-1);} } }); },{threshold:.2});
  var secs = document.querySelectorAll('.section[id]'); for(var i=0;i<secs.length;i++) obs.observe(secs[i]);
}

// Global functions
function toggleCard(h){ h.closest('.day-card').classList.toggle('collapsed'); }
function showPane(btn,grp,id){
  var tabs = btn.closest('.day-body').querySelectorAll('.day-tab');
  for(var i=0;i<tabs.length;i++) tabs[i].classList.remove('active');
  btn.classList.add('active');
  var panes = btn.closest('.day-body').querySelectorAll('.day-pane');
  for(var i=0;i<panes.length;i++) panes[i].classList.remove('active');
  document.getElementById(id).classList.add('active');
}
function tgl(li){
  var cb = li.querySelector('input'); cb.checked = !cb.checked;
  li.classList.toggle('checked', cb.checked);
  try { var items = document.querySelectorAll('#cl input'); var s=[]; for(var i=0;i<items.length;i++) s.push(items[i].checked); localStorage.setItem('tc4',JSON.stringify(s)); } catch(e){}
}
function toggleExpand(btn){
  btn.classList.toggle('open');
  var body = btn.nextElementSibling;
  body.classList.toggle('show');
}
function showPkg(num){
  var p = window._hotelPkgs[num]; if(!p) return;
  var h = '<h4>🎁 חבילה מיוחדת — '+p.name+'</h4>';
  if(p.price) h += '<div style="background:#e8f5e9;padding:8px 12px;border-radius:8px;margin-bottom:12px;font-weight:600;color:#2e7d32">💰 '+p.price+'</div>';
  h += '<ul>'+p.items.map(function(i){ return '<li><span>✅</span><span>'+i+'</span></li>'; }).join('')+'</ul>';
  h += '<button class="close-btn" onclick="closePkg()">סגור</button>';
  document.getElementById('pkgModal').innerHTML = h;
  document.getElementById('pkgOverlay').classList.add('show');
}
function closePkg(){ document.getElementById('pkgOverlay').classList.remove('show'); }
function toggleMapFullscreen(){
  var c = document.getElementById('mapContainer');
  var btn = c.querySelector('.map-fullscreen-btn');
  c.classList.toggle('fullscreen');
  var isFs = c.classList.contains('fullscreen');
  btn.innerHTML = isFs ? '✕ סגור מסך מלא' : '⛶ מסך מלא';
  document.body.style.overflow = isFs ? 'hidden' : '';
  if (window._tripMap) setTimeout(function(){ window._tripMap.invalidateSize(); },200);
}
function navTo(id){
  var el = document.getElementById(id);
  if(!el) return;
  var nav = document.querySelector('.nav');
  var offset = nav ? nav.offsetHeight + 10 : 70;
  var top = el.getBoundingClientRect().top + window.pageYOffset - offset;
  window.scroll({top: top, behavior:'smooth'});
  var btns = document.querySelectorAll('.nav-btn');
  for(var i=0;i<btns.length;i++) btns[i].classList.remove('active');
  if(event && event.target) event.target.classList.add('active');
}

// Load
fetch(DATA_FILE)
  .then(function(r){ return r.json(); })
  .then(render)
  .catch(function(e){
    document.getElementById('app').innerHTML = '<div style="padding:40px;text-align:center;color:red">' +
      '<h2>שגיאה בטעינת נתונים</h2><p>ודאו שהקובץ <code>trip_data.json</code> נמצא באותה תיקייה.</p>' +
      '<p style="font-size:.8em;color:#888">'+e.message+'</p></div>';
  });
</script>
